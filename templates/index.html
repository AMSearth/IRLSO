<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRLSO - Intelligent Real-time Log & Security Orchestrator</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            bg: '#050510',
                            panel: 'rgba(10, 15, 30, 0.7)',
                            border: 'rgba(0, 255, 204, 0.3)',
                            blue: '#00f0ff',
                            pink: '#ff003c',
                            green: '#39ff14',
                            yellow: '#fdf500',
                            orange: '#ff5500',
                        }
                    },
                    fontFamily: {
                        mono: ['"Fira Code"', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS for animations and complex layers -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-cyber-bg text-cyber-blue font-mono h-screen overflow-hidden relative theme-bg scanlines">
    
    <div class="flex flex-col h-screen p-5 gap-5 relative z-10">
        <!-- Header -->
        <header class="text-center border-b-2 border-cyber-border pb-4 relative shadow-[0_5px_15px_rgba(0,240,255,0.1)]">
            <h1 class="text-4xl uppercase tracking-widest text-cyber-blue drop-shadow-[0_0_10px_#00f0ff] glitch" data-text="IRLSO_TERMINAL">IRLSO_TERMINAL</h1>
            <p class="text-[#0088aa] text-sm mt-1 tracking-[4px]">INTELLIGENT REAL-TIME LOG & SECURITY ORCHESTRATOR :: SIMULATION NODE</p>
        </header>

        <!-- Dashboard Layout -->
        <main class="flex flex-1 gap-5 h-[calc(100vh-120px)]">
            
            <!-- Log Monitor -->
            <section class="flex-2 flex flex-col bg-cyber-panel backdrop-blur-sm border border-cyber-border rounded shadow-[inset_0_0_20px_rgba(0,255,204,0.05),0_0_15px_rgba(0,0,0,0.5)] w-2/3">
                <div class="bg-[rgba(0,255,204,0.1)] px-4 py-2 border-b border-cyber-border flex justify-between items-center">
                    <h2 class="text-lg text-cyber-blue drop-shadow-[0_0_5px_#00f0ff]">> SYSTEM_LOGS</h2>
                    <span class="text-xs px-2 py-1 rounded-full border border-cyber-green text-cyber-green shadow-[0_0_8px_#39ff14] pulse-anim">ONLINE</span>
                </div>
                <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 text-sm custom-scrollbar" id="log-content">
                    <!-- Logs will be injected here via JS -->
                </div>
            </section>

            <!-- Control Panel -->
            <aside class="flex-1 flex flex-col min-w-[300px] bg-cyber-panel backdrop-blur-sm border border-cyber-border rounded shadow-[inset_0_0_20px_rgba(0,255,204,0.05),0_0_15px_rgba(0,0,0,0.5)]">
                <div class="bg-[rgba(0,255,204,0.1)] px-4 py-2 border-b border-cyber-border">
                    <h2 class="text-lg text-cyber-blue drop-shadow-[0_0_5px_#00f0ff]">> TERMINAL_CONTROLS</h2>
                </div>
                
                <div class="p-5 flex flex-col gap-4">
                    <h3 class="text-[#0088aa] text-sm border-b border-cyber-border pb-1">THREAT INJECTION</h3>
                    <button class="cyber-btn text-cyber-pink border border-[rgba(255,0,60,0.5)] hover:bg-[rgba(255,0,60,0.15)] hover:shadow-[0_0_15px_rgba(255,0,60,0.4)]" onclick="injectThreat('SQL Injection')">[ INJECT SQLi ]</button>
                    <button class="cyber-btn text-cyber-pink border border-[rgba(255,0,60,0.5)] hover:bg-[rgba(255,0,60,0.15)] hover:shadow-[0_0_15px_rgba(255,0,60,0.4)]" onclick="injectThreat('DDoS Attack')">[ INITIALIZE DDoS ]</button>
                    <button class="cyber-btn text-cyber-pink border border-[rgba(255,0,60,0.5)] hover:bg-[rgba(255,0,60,0.15)] hover:shadow-[0_0_15px_rgba(255,0,60,0.4)]" onclick="injectThreat('Brute Force')">[ EXECUTE BRUTE_FORCE ]</button>
                </div>
                
                <div class="p-5 flex flex-col gap-2 border-t border-dashed border-cyber-border mt-auto">
                    <h3 class="text-[#0088aa] text-sm mb-2">SYSTEM METRICS</h3>
                    <div class="text-xs">
                        <span class="block mb-1">CPU_LOAD</span>
                        <div class="w-full h-1.5 bg-black/50 border border-cyber-border rounded overflow-hidden">
                            <div class="h-full bg-cyber-pink shadow-[0_0_10px_#ff003c] transition-all duration-300" id="cpu-fill" style="width: 20%;"></div>
                        </div>
                    </div>
                    <div class="text-xs">
                        <span class="block mb-1">MEMORY</span>
                        <div class="w-full h-1.5 bg-black/50 border border-cyber-border rounded overflow-hidden">
                            <div class="h-full bg-cyber-yellow shadow-[0_0_10px_#fdf500] transition-all duration-300" id="mem-fill" style="width: 45%;"></div>
                        </div>
                    </div>
                    <div class="text-xs">
                        <span class="block mb-1">NET_TRAFFIC</span>
                        <div class="w-full h-1.5 bg-black/50 border border-cyber-border rounded overflow-hidden">
                            <div class="h-full bg-cyber-blue shadow-[0_0_10px_#00f0ff] transition-all duration-300" id="net-fill" style="width: 15%;"></div>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <!-- Threat Toast Container -->
        <div id="active-threats-container" class="fixed top-5 right-5 flex flex-col gap-3 z-50">
            <!-- Active threats requiring manual termination pop up here -->
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
